name: Scrape Real Estate
modules: real-estate

steps:
  - name: Ingest
    model: general
    prompt: |
      Download all active for-sale listings from realtor.com that match the following criteria:

      - Status: for_sale
      - Min square feet: 1750
      - Max price: $850,000
      - Min bedrooms: 3
      - Home type: single_family
      - Year built: no more recent than 2017 (exclude newer construction)

      Query each of the following zipcodes separately:
        - 37204
        - 37216
        - 37206

      Use the querying-realtor-dot-com skill for the GraphQL API details. For each zipcode,
      set `search_location.location` to the zipcode string (e.g. "37204") and use `buffer: 0`.

      Filter criteria in the query variables:
        - `status`: ["for_sale"]
        - `beds`: { "min": 3 }
        - `sqft`: { "min": 1750 }
        - `list_price`: { "max": 850000 }
        - `type`: ["single_family"]

      Paginate through all results (use `offset` and `limit`; check `total` in the response).

      After fetching, post-filter the results to remove any property where `year_built` > 2017.

      Combine all results from all three zipcodes into a single JSON array, deduplicating by
      `property_id`. For each property, keep at minimum:
        - property_id
        - list_price
        - permalink
        - description (beds, baths_consolidated, sqft, lot_sqft, year_built, type, garage)
        - location (full address, coordinates, county)
        - flags
        - photos (URLs)
        - list_date

      Save the combined results to `./realtor-listings/raw-listings.json`.

      Then store the file path `./realtor-listings/raw-listings.json` into the workflow memory
      using key `realtor-listings`.
    skills:
      - querying-realtor-dot-com

  - name: Analyze
    model: smart
    prompt: |
      In the previous step, we downloaded raw listing data from realtor.com.

      1. Read the workflow memory key `realtor-listings` to find the raw data file path,
         then read that file.

      2. Check the "scrape-real-estate" memory domain for the key "scraped-listings".
         This should be a JSON string array of property_ids that have already been analyzed.
         If it doesn't exist yet, treat it as an empty array.

      3. Discard any property whose property_id is already in the scraped-listings array.

      4. For each remaining property, analyze whether it would be a good fit based on the
         following buyer profile:

         - Young family expecting their first child soon.
         - They have a dog, so a bigger yard (lot_sqft) is a significant plus.
         - Wife prefers older builds that have been recently renovated (look for signs of
           renovation in listing details, newer interior photos, updated kitchens/baths, etc.).
         - Husband works from home, so a 4th bedroom or large bonus room is a big plus.
         - They strongly dislike the "tall and skinny" style common in Nashville over the
           last ~10 years. Watch for narrow lot sizes, 3+ stories, or keywords indicating
           this style. When in doubt, flag it.

      5. For each property, make a decision: "approved" or "denied".

         Write a concise analysis to:
           ./realtor-listings/approved/<address-slug>.md   (if approved)
           ./realtor-listings/denied/<address-slug>.md     (if denied)

         The address slug should be the street address, lowercased, with spaces replaced by
         hyphens and special characters removed. E.g. "123-main-street".

         Each file should contain:
           - Address and list price
           - Key stats (beds, baths, sqft, lot sqft, year built)
           - Realtor.com link (https://www.realtor.com/realestateandhomes-detail/{permalink})
           - Brief reasoning (2-4 sentences) explaining why approved or denied
           - Final decision line: `**Decision: Approved**` or `**Decision: Denied**`

      6. After processing all new listings, update the "scraped-listings" key in the
         "scrape-real-estate" memory domain. Merge the newly analyzed property_ids into the
         existing array and save the updated array back.

      7. Print a summary: how many new listings analyzed, how many approved, how many denied.
    skills:
      - querying-realtor-dot-com
