name: Feature Implementation
steps:
  - name: Brainstorm
    model: smart
    thinking: high
    prompt: "@development/brainstorm.md"
    skills:
      - brainstorming
    modules: ask
    approval: true

  - name: Plan
    model: smart
    prompt: "@development/plan.md"
    skills:
      - writing-plans

  - name: Implement
    model: smart
    prompt: "@development/implement.md"
    skills:
      - executing-plans
    conditions:
      - command: check-todos-complete
        args:
          memoryKey: plan-todo
        jump: Implement
