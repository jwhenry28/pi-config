name: Pi Extension Implementation
steps:
  - name: Brainstorm
    model: smart
    thinking: high
    prompt: "@development/brainstorm.md"
    skills:
      - brainstorming
      - writing-pi-extensions
    approval: true
    modules: ask

  - name: Plan
    model: smart
    prompt: "@development/plan.md"
    skills:
      - writing-plans
      - writing-pi-tests

  - name: Implement
    model: smart
    prompt: "@development/implement.md"
    skills:
      - executing-plans
    conditions:
      - command: incomplete-todos-remaining
        args:
          memoryKey: plan-todo
        jump: Implement
        explanation: The implementation todo list still has unchecked items, so continue working through the plan before moving on.

  - name: Code Review
    model: smart
    prompt: |
      Read the plan from memory key "plan" and the todo from memory key "plan-todo".
      Read all plan files and review the implemented extension code against the patterns and style
      defined in the writing-pi-extensions and writing-pi-tests skills.

      Note any issues where the code deviates from the expected patterns, conventions,
      or style. Present your findings in the chat.

      Also flag code-quality issues (step-down rule violations, excessive nesting, unclear names).

      Ask the user if you should fix the issues directly in the code.
      If the user agrees, implement the fixes yourself and present a summary of changes made.
    skills:
      - knowing-clean-code
      - writing-pi-extensions
      - writing-pi-tests
    approval: true
