name: Extension Implementation
steps:
  - name: Brainstorm
    model: smart
    prompt: "@development/brainstorm.md"
    skills:
      - brainstorming
      - writing-pi-extensions
    approval: true
    modules: ask

  - name: Plan
    model: smart
    prompt: "@development/plan.md"
    skills:
      - writing-plans
      - writing-pi-tests

  - name: Component Tests
    model: smart
    prompt: |
      Read the plan directory from memory key "plan" and the todo file path from memory key "plan-todo".
      Review the existing plan tasks and the extension being developed.

      Add one or more new component test tasks as the next taskN.md file(s) in the plan directory.
      The tasks should describe writing component tests for the extension, focusing on:
      - Slash commands (if any)
      - Agent tools (if any)

      If the extension has neither slash commands nor agent tools, add a single task noting
      that no component tests are needed, then skip.

      Follow the writing-pi-tests skill patterns for test structure and conventions.

      Then append new unchecked `- [ ]` items for each test task to the todo.md file.
    skills:
      - writing-pi-tests
      - writing-pi-extensions

  - name: Implement
    model: smart
    prompt: "@development/implement.md"
    skills:
      - executing-plans
    conditions:
      - command: check-todos-complete
        args:
          memoryKey: plan-todo
        jump: Implement

  - name: Code Review
    model: smart
    prompt: |
      Read the plan from memory key "plan" and the todo from memory key "plan-todo".
      Read all plan files and review the implemented extension code against the patterns and style
      defined in the writing-pi-extensions and writing-pi-tests skills.

      Note any issues where the code deviates from the expected patterns, conventions,
      or style. Present your findings in the chat.

      Also flag code-quality issues (step-down rule violations, excessive nesting, unclear names).

      Ask the user if you should fix the issues directly in the code.
      If the user agrees, implement the fixes yourself and present a summary of changes made.
    skills:
      - knowing-clean-code
      - writing-pi-extensions
      - writing-pi-tests
    approval: true
