name: Test Workflow
steps:
  - name: Create Todo
    model: fast
    prompt: |
      Create a file called "todo.md" in the current directory with a markdown
      checklist of 3 simple items (e.g. buy groceries, clean kitchen, do laundry).
      All items should start unchecked ([ ]).

  - name: Complete Item
    model: fast
    maxExecutions: 2
    prompt: |
      Read "todo.md" in the current directory. Find the first unchecked item
      ([ ]) and mark it as completed ([x]). Write the file back. Do nothing else.
    conditions:
      - command: check-todos-complete
        args:
          todoFilepath: todo.md
        jump: Complete Item
