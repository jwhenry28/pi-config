name: Simple Feature
steps:
  - name: Brainstorm
    model: smart
    thinking: high
    prompt: "@development/brainstorm.md"
    skills:
      - brainstorming
    modules: ask
    approval: true

  - name: Plan
    model: smart
    prompt: "@development/simple-plan.md"

  - name: Implement
    model: general
    prompt: "@development/simple-implement.md"
    skills:
      - knowing-clean-code
    conditions:
      - command: incomplete-todos-remaining
        args:
          memoryKey: plan-todo
        jump: Implement
        explanation: The implementation todo list still has unchecked items, so continue working through the plan before moving on.

  - name: Review
    model: smart
    prompt: "@development/review.md"
    skills:
      - knowing-clean-code
      - knowing-dry
      - knowing-yagni
    approval: true
